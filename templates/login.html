<!DOCTYPE html>
<html>
<head>
    <title>Login - RR Earth Movers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="login-box">
    <h4 class="text-center mb-3">RR Earth Movers</h4>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success w-100">Login</button>
    </form>
</div>

</body>
</html>
